name: Keep backend awake

# Pings the Render backend every ~10 minutes so it never idles long enough
# to spin down (Render free tier sleeps after 15 min of inactivity).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping products endpoint
        run: |
          echo "Pinging backend at $(date -u)"
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://nonyes-pasta-backend.onrender.com/api/store/products/ || true
